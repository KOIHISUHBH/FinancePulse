<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="flex justify-between items-center mb-8 border-b border-slate-200 pb-4">
            <h1 class="text-3xl font-bold text-slate-900">Finance<span class="text-emerald-600">Pulse</span></h1>
            <div class="text-sm text-slate-500" id="current-date"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-100">
                <p class="text-sm font-medium text-slate-500 uppercase tracking-wider">Total Balance</p>
                <p class="text-3xl font-bold text-slate-900 mt-2" id="total-balance">$0.00</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-100">
                <p class="text-sm font-medium text-slate-500 uppercase tracking-wider">Total Income</p>
                <p class="text-3xl font-bold text-emerald-600 mt-2" id="total-income">$0.00</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-100">
                <p class="text-sm font-medium text-slate-500 uppercase tracking-wider">Total Expenses</p>
                <p class="text-3xl font-bold text-rose-600 mt-2" id="total-expenses">$0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6 lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-100">
                    <h2 class="text-xl font-bold mb-4 text-slate-900">Add Transaction</h2>
                    <form id="transaction-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                            <input type="text" id="desc" required placeholder="e.g., Groceries, Salary" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Amount ($)</label>
                            <input type="number" id="amount" step="0.01" required placeholder="0.00" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                            <select id="type" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                                <option value="income">Income (+)</option>
                                <option value="expense">Expense (-)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                            <select id="category" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                                <option value="Salary">Salary / Income</option>
                                <option value="Food">Food & Dining</option>
                                <option value="Rent">Rent & Housing</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200">Add Transaction</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-100">
                    <h2 class="text-xl font-bold mb-2 text-slate-900">Monthly Expense Limit</h2>
                    <p class="text-xs text-slate-500 mb-4">Set a cap to monitor your spending health.</p>
                    <div class="flex gap-2 mb-4">
                        <input type="number" id="budget-input" placeholder="Set limit" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                        <button id="save-budget" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Save</button>
                    </div>
                    <div id="budget-status" class="hidden p-3 rounded-lg text-sm font-medium"></div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-100">
                    <h2 class="text-xl font-bold mb-4 text-slate-900">Expense Breakdown</h2>
                    <div class="max-h-64 flex justify-center">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-900">Recent Transactions</h2>
                        <button id="clear-all" class="text-xs text-rose-600 hover:underline">Clear All</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-200 text-xs font-semibold text-slate-400 uppercase">
                                    <th class="py-3 px-2">Description</th>
                                    <th class="py-3 px-2">Category</th>
                                    <th class="py-3 px-2 text-right">Amount</th>
                                    <th class="py-3 px-2 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list" class="divide-y divide-slate-100 text-sm">
                                </tbody>
                        </table>
                        <div id="empty-state" class="text-center py-8 text-slate-400 hidden">
                            No transactions added yet.
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
